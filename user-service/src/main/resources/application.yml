spring:
  application:
    name: user-service

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: your-secret-key-here
  expiration: 86400000