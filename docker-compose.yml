version: '3.8'

services:

  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: ordernest-postgres
    environment:
      POSTGRES_USER: ordernest
      POSTGRES_PASSWORD: ordernest
      POSTGRES_DB: ordernest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ordernest-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ordernest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zipkin:
    image: openzipkin/zipkin:3
    container_name: ordernest-zipkin
    ports:
      - "9411:9411"

  # ─────────────────────────────────────────
  # Dev 2 — Service Discovery & Gateway
  # ─────────────────────────────────────────

  eureka-server:
    build: ./eureka-server
    container_name: ordernest-eureka
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    container_name: ordernest-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─────────────────────────────────────────
  # Dev 1 — User, Order, Delivery
  # ─────────────────────────────────────────

  user-service:
    build: ./user-service
    container_name: ordernest-user
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  order-service:
    build: ./order-service
    container_name: ordernest-order
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  delivery-service:
    build: ./delivery-service
    container_name: ordernest-delivery
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─────────────────────────────────────────
  # Dev 2 — Restaurant, Payment, Notification
  # ─────────────────────────────────────────

  restaurant-service:
    build: ./restaurant-service
    container_name: ordernest-restaurant
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  payment-service:
    build: ./payment-service
    container_name: ordernest-payment
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - kafka
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  notification-service:
    build: ./notification-service
    container_name: ordernest-notification
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - eureka-server
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ─────────────────────────────────────────
  # Dev 3 — Analytics, Admin, Review
  # ─────────────────────────────────────────

  analytics-service:
    build: ./analytics-service
    container_name: ordernest-analytics
    ports:
      - "8087:8087"
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  admin-service:
    build: ./admin-service
    container_name: ordernest-admin
    ports:
      - "8088:8088"
    depends_on:
      - postgres
      - kafka
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  review-service:
    build: ./review-service
    container_name: ordernest-review
    ports:
      - "8089:8089"
    depends_on:
      - postgres
      - kafka
      - redis
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordernest
      SPRING_DATASOURCE_USERNAME: ordernest
      SPRING_DATASOURCE_PASSWORD: ordernest
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

volumes:
  postgres_data:
